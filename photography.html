<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edward Kabuko — Photography</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   DESIGN TOKENS & SYSTEM BASE
=================================================================== */
:root{
  --ink:#F3F3F6;
  --ink-soft:#B7B7C2;
  --muted:#62626C;
  --paper:#050508;
  --paper-2:#0B0B11;
  --paper-3:#12121A;
  --white:#0F0F15;
  --line:rgba(255,255,255,0.08);
  --line-soft:rgba(255,255,255,0.03);
  
  --neon-violet:#A855F7;
  --neon-pink:#EC4899;
  --neon-cyan:#06B6D4;
  
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', -apple-system, sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --max:1180px;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x: hidden;
}
a{color:inherit;text-decoration:none;}
ul{list-style:none;margin:0;padding:0;}
button{font-family:inherit;cursor:pointer;}

.container{max-width:var(--max);margin:0 auto;padding:0 6vw;}

.grid-bg{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size:50px 50px;
  opacity:0.4;
  mask-image:radial-gradient(circle at 75% 25%, black 20%, transparent 80%);
}

.tneosm-canvas-backdrop {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

/* ===================== TYPOGRAPHY & BUTTONS ===================== */
h1,h2,h3,h4{font-family:var(--font-display); font-weight:500; margin:0 0 0.5em;}
h1{font-size:clamp(2.5rem, 5.2vw, 4.4rem); line-height:1.1; letter-spacing:-0.02em;}
h2{font-size:clamp(1.8rem, 3.5vw, 2.5rem); margin-bottom: 2rem;}
p{margin:0 0 1.2em; color:var(--ink-soft);}

.eyebrow{
  font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted);
  display:flex; align-items:center; gap:0.7em; margin-bottom:1.2em;
}
.eyebrow::before{content:""; width:16px; height:1px; background:var(--line); display:inline-block;}

/* Isolated Filter controls styling */
.filter-controls {
  display: flex; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap;
}
.filter-btn {
  background: rgba(255, 255, 255, 0.02); border: 1px solid var(--line);
  color: var(--ink-soft); font-family: var(--font-mono); font-size: 0.75rem;
  padding: 0.6em 1.5rem; border-radius: 4px; transition: all 0.3s ease;
}
.filter-btn:hover, .filter-btn.active {
  color: var(--ink); border-color: var(--ink); background: rgba(255, 255, 255, 0.08);
}
.filter-btn.active {
  box-shadow: 0 0 12px rgba(6, 182, 212, 0.3); border-color: var(--neon-cyan);
}

/* ===================== SITE NAV ===================== */
.site-nav{position:sticky; top:0; z-index:100; background:rgba(5,5,8,0.75); backdrop-filter:blur(20px); border-bottom:1px solid var(--line);}
.site-nav .container{display:flex; align-items:center; justify-content:space-between; height:76px;}
.brand{font-family:var(--font-mono); font-size:0.95rem; font-weight:500; display:flex; align-items:center; gap:0.6em;}
.brand .status-orb {width:8px; height:8px; border-radius:50%; background:var(--neon-pink);}
.nav-links{display:flex; gap:2.2rem;}
.nav-links a{font-family:var(--font-mono); font-size:0.8rem; color:var(--ink-soft); position:relative; padding:0.4em 0;}
.nav-links a.active{color:var(--ink);}

/* ===================== GALLERY SHOWCASE ===================== */
section{padding:6rem 0;}
.featured-strip{
  display:grid; grid-template-columns:repeat(3,1fr); gap:1.8rem;
  transition: all 0.4s ease;
}

.feat-card{
  border:1px solid var(--line); background:var(--white); border-radius:6px; overflow:hidden;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, border-color 0.4s ease;
  opacity: 1; transform: scale(1);
}
/* Class used to cleanly hide unselected tags */
.feat-card.hidden {
  display: none; opacity: 0; transform: scale(0.95);
}

.feat-thumb{aspect-ratio:16/10; background:var(--paper-3); position:relative; overflow:hidden; cursor: pointer;}
.feat-card .feat-body{padding:1.4rem;}
.feat-card h4{font-size:1.1rem; margin:0.3em 0 0.5em;}
.feat-card .frame-tag{font-family:var(--font-mono); font-size:0.7rem; color:var(--muted); display:block;}

.feat-card:hover{
  border-color: rgba(6, 182, 212, 0.5);
  transform: translateY(-6px) scale(1.01);
}

/* ===================== LIGHTBOX OVERLAY ===================== */
.fancy-lightbox {
  position: fixed; inset: 0; z-index: 200; background: rgba(5, 5, 8, 0.92); backdrop-filter: blur(25px);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 2rem;
}
.fancy-lightbox.active { opacity: 1; pointer-events: auto; }
.lightbox-content {
  max-width: 85vw; max-height: 75vh; transform: scale(0.9) translateY(30px);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.15); object-fit: contain;
}
.fancy-lightbox.active .lightbox-content { transform: scale(1) translateY(0); }
.lightbox-close {
  position: absolute; top: 30px; right: 40px; background: none; border: none; color: var(--ink-soft);
  font-family: var(--font-mono); font-size: 0.85rem; padding: 0.5em 1em; border: 1px solid var(--line); border-radius: 4px;
}
.lightbox-caption { margin-top: 1.5rem; font-family: var(--font-display); font-size: 1.2rem; color: var(--ink); }

footer{border-top:1px solid var(--line); padding:3.5rem 0 2.5rem; margin-top:5rem;}
.foot-bottom{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:0.75rem; color:var(--muted);}

@media (max-width:980px){ .featured-strip{grid-template-columns:repeat(2,1fr);} }
@media (max-width:640px){ .featured-strip{grid-template-columns:1fr;} }
</style>
</head>
<body>

<canvas class="tneosm-canvas-backdrop" id="tneosmSpindleBackdrop"></canvas>
<div class="grid-bg"></div>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="brand"><span class="status-orb"></span>E. Edwards</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="engineering.html">Engineering</a></li>
      <li><a href="photography.html" class="active">Photography</a></li>
      <li><a href="blog.html">Blog</a></li>
    </ul>
  </div>
</nav>

<section>
  <div class="container">
    <div class="section-head">
      <div class="eyebrow">Visual Log</div>
      <h2>Captured Frames</h2>
    </div>

    <!-- Filter Mechanism Interface Controls -->
    <div class="filter-controls">
      <button class="filter-btn active" data-filter="all">All Frames</button>
      <button class="filter-btn" data-filter="automation">Automation</button>
      <button class="filter-btn" data-filter="architecture">Architecture</button>
      <button class="filter-btn" data-filter="process">Digital Twin</button>
    </div>

    <!-- Gallery items mapping sorting data structures -->
    <div class="featured-strip" id="galleryGrid">
      <div class="feat-card" data-category="automation">
        <div class="feat-thumb js-lightbox-trigger">
          <img src="img/automation.jpg" alt="Digital Site Infrastructure" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="feat-body">
          <span class="frame-tag">R.01 · Automation</span>
          <h4>Digital Site Infrastructure</h4>
        </div>
      </div>

      <div class="feat-card" data-category="architecture">
        <div class="feat-thumb js-lightbox-trigger">
          <img src="img/Digital.jpg" alt="Intelligent Urban Grid" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="feat-body">
          <span class="frame-tag">R.02 · Architecture</span>
          <h4>Intelligent Urban Grid</h4>
        </div>
      </div>

      <div class="feat-card" data-category="process">
        <div class="feat-thumb js-lightbox-trigger">
          <img src="img/Twin.jpg" alt="Industrial Process Mirror" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <div class="feat-body">
          <span class="frame-tag">R.03 · Digital Twin</span>
          <h4>Industrial Process Mirror</h4>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Lightbox Modal Target Nodes -->
<div class="fancy-lightbox" id="fancyLightbox">
  <button class="lightbox-close" id="lightboxClose">Close &times;</button>
  <img src="" alt="" class="lightbox-content" id="lightboxTargetImg">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<footer>
  <div class="container">
    <div class="foot-bottom">
      <span>© 2026 Edward Kabuko. All rights reserved.</span>
    </div>
  </div>
</footer>

<script>
// Lightbox Implementation
document.addEventListener('DOMContentLoaded', () => {
  const lightbox = document.getElementById('fancyLightbox');
  const targetImg = document.getElementById('lightboxTargetImg');
  const caption = document.getElementById('lightboxCaption');
  const closeBtn = document.getElementById('lightboxClose');
  const triggers = document.querySelectorAll('.js-lightbox-trigger');

  triggers.forEach(trigger => {
    trigger.addEventListener('click', () => {
      const img = trigger.querySelector('img');
      if (img) {
        targetImg.src = img.src;
        targetImg.alt = img.alt;
        caption.textContent = img.alt;
        lightbox.classList.add('active');
      }
    });
  });

  const closeLightbox = () => lightbox.classList.remove('active');
  closeBtn.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
});

// Dynamic Gallery Sorting/Filtering Engine Logic 
document.addEventListener('DOMContentLoaded', () => {
  const filterButtons = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('.feat-card');

  filterButtons.forEach(button => {
    button.addEventListener('click', () => {
      // Manage active button class rules
      filterButtons.forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      const filterValue = button.getAttribute('data-filter');

      cards.forEach(card => {
        const cardCategory = card.getAttribute('data-category');
        if (filterValue === 'all' || cardCategory === filterValue) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    });
  });
});

// tneosm background spindle rendering engine code remains untouched below
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('tneosmSpindleBackdrop');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let time = 0;
  let mouse = { x: 0, y: 0, targetX: 0, targetY: 0 };

  function setSize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', setSize);
  setSize();

  window.addEventListener('mousemove', (e) => {
    mouse.targetX = (e.clientX - canvas.width / 2) * 0.28;
    mouse.targetY = (e.clientY - canvas.height / 2) * 0.28;
  });

  function drawTneosmSpindle() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    mouse.x += (mouse.targetX - mouse.x) * 0.06;
    mouse.y += (mouse.targetY - mouse.y) * 0.06;
    time += 0.0045;

    const centerX = canvas.width * 0.78 + mouse.x;
    const centerY = canvas.height * 0.30 + mouse.y;
    const ribCount = 64; 
    const pointsPerRib = 70;
    const maxRadius = Math.min(canvas.width, canvas.height) * 0.48;

    for (let i = 0; i < ribCount; i++) {
      const normRib = i / ribCount;
      const pinchWave = Math.sin(time * 2.0 + normRib * Math.PI * 3.0) * 35;
      const radius = maxRadius * (0.10 + normRib * 0.90) + pinchWave;

      ctx.beginPath();
      for (let j = 0; j < pointsPerRib; j++) {
        const normPt = j / pointsPerRib;
        const angle = normPt * Math.PI * 2 + (time * (0.8 + (1 - normRib) * 1.1));
        const xRaw = Math.cos(angle) * radius;
        const yRaw = Math.sin(angle * 2.5) * (radius * 0.42); 
        const tilt = 0.68 + Math.cos(time * 0.4 + normRib * 0.5) * 0.12;
        const xRotated = xRaw * Math.cos(tilt) - yRaw * Math.sin(tilt);
        const yRotated = xRaw * Math.sin(tilt) + yRaw * Math.cos(tilt);
        const finalX = centerX + xRotated;
        const finalY = centerY + yRotated;

        if (j === 0) ctx.moveTo(finalX, finalY);
        else ctx.lineTo(finalX, finalY);
      }
      ctx.closePath();

      const colorProgress = Math.sin(time * 1.5 + normRib * Math.PI * 2.5) * 0.5 + 0.5;
      let rColor, gColor, bColor;
      if (colorProgress < 0.33) {
        const ratio = colorProgress * 3;
        rColor = Math.floor(168 + (236 - 168) * ratio); gColor = Math.floor(85 + (72 - 85) * ratio); bColor = Math.floor(247 + (153 - 247) * ratio);
      } else if (colorProgress < 0.66) {
        const ratio = (colorProgress - 0.33) * 3;
        rColor = Math.floor(236 + (6 - 236) * ratio); gColor = Math.floor(72 + (182 - 72) * ratio); bColor = Math.floor(247 + (153 - 247) * ratio);
      } else {
        const ratio = (colorProgress - 0.66) * 3;
        rColor = Math.floor(6 + (168 - 6) * ratio); gColor = Math.floor(182 + (85 - 182) * ratio); bColor = Math.floor(212 + (247 - 212) * ratio);
      }

      const dynamicAlpha = (0.015 + normRib * 0.14) * (0.35 + Math.sin(time * 2.5 + normRib * 5.0) * 0.45);
      ctx.strokeStyle = `rgba(${rColor}, ${gColor}, ${bColor}, ${Math.max(0.005, Math.min(0.28, dynamicAlpha))})`;
      ctx.lineWidth = 0.7 + (normRib * 1.1);
      ctx.stroke();
    }
    requestAnimationFrame(drawTneosmSpindle);
  }
  drawTneosmSpindle();
});
</script>
</body>
</html>
